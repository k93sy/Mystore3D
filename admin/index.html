<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Balance 3D — Admin</title>
  <meta name="robots" content="noindex, nofollow"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="../css/tokens.css"/>
  <link rel="stylesheet" href="css/admin.css"/>

  <style>
    /* Minimal page-level reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg, #F0F2F8); color: var(--clr-text-primary, #0A0A0F); font-family: 'Tajawal', sans-serif; }
    #admContent { min-height: 200px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     APP SHELL  —  populated by Admin._renderShell()
══════════════════════════════════════════════════ -->
<div class="adm-shell" id="admShell">

  <!-- Sidebar (rendered by JS) -->
  <aside class="adm-sidebar" id="admSidebar" aria-label="القائمة الرئيسية"></aside>

  <!-- Topbar (rendered by JS) -->
  <header class="adm-topbar" id="admTopbar"></header>

  <!-- Main content area -->
  <main class="adm-main" id="admMain" role="main">
    <div id="admContent" aria-live="polite" aria-busy="true"></div>
  </main>

</div>

<!-- Sidebar overlay (mobile) -->
<div class="adm-overlay" id="admOverlay" aria-hidden="true"></div>

<!-- Toast container -->
<div id="admToasts" aria-live="assertive" aria-atomic="true"></div>

<!-- ══════════════════════════════════════════════════
     MODAL
══════════════════════════════════════════════════ -->
<div class="adm-modal" id="admModal" role="dialog" aria-modal="true" aria-labelledby="admModalTitle">
  <!-- Backdrop -->
  <div class="adm-modal__bd" onclick="closeModal()"></div>

  <!-- Box -->
  <div class="adm-modal__box">

    <!-- Header -->
    <div class="adm-modal__hdr">
      <h2 class="adm-modal__title" id="admModalTitle"></h2>
      <button class="adm-modal__close" onclick="closeModal()" aria-label="إغلاق">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Dynamic body (each section fills this) -->
    <div class="adm-modal__body" id="admModalBody"></div>

    <!-- Dynamic footer (optional action buttons) -->
    <div class="adm-modal__foot" id="admModalFoot"></div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════
     SCRIPTS  —  load order matters
══════════════════════════════════════════════════ -->

<!-- 1. Supabase SDK (required by js/core/db.js even if unconfigured) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- 2. Storefront core (DB + AuthService) -->
<script src="../js/core/db.js"></script>
<script src="../js/core/auth.js"></script>

<!-- 3. Admin data layer -->
<script src="js/db.js"></script>

<!-- 4. Admin application -->
<script src="js/app.js"></script>

<!-- ═══ SUPABASE DEBUG PANEL ═══════════════════════════════════════════
     Floating button (bottom-right). Click to open/close the panel.
     Shows live Supabase connection status and lets you run a test write.
     Remove this block once everything is confirmed working.
════════════════════════════════════════════════════════════════════════ -->
<style>
#sb-debug-btn{position:fixed;bottom:1.2rem;right:1.2rem;z-index:99999;background:#0f172a;color:#fff;border:none;border-radius:999px;padding:.5rem 1rem;font-size:.75rem;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);letter-spacing:.04em}
#sb-debug-btn:hover{background:#1e293b}
#sb-debug-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99998;align-items:flex-end;justify-content:flex-end;padding:1rem}
#sb-debug-overlay.open{display:flex}
#sb-debug-box{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:1.25rem 1.4rem;width:420px;max-width:95vw;max-height:80vh;overflow-y:auto;font-family:monospace;font-size:.75rem;line-height:1.65;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#sb-debug-box h3{margin:0 0 .8rem;font-size:.9rem;color:#f8fafc;font-family:sans-serif}
.sb-row{display:flex;justify-content:space-between;gap:.5rem;padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-label{color:#94a3b8}
.sb-ok{color:#4ade80;font-weight:700}
.sb-fail{color:#f87171;font-weight:700}
.sb-warn{color:#fbbf24;font-weight:700}
#sb-debug-log{margin-top:.8rem;padding:.6rem;background:rgba(255,255,255,.04);border-radius:6px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;font-size:.7rem;color:#94a3b8}
#sb-test-btn{margin-top:.8rem;width:100%;padding:.45rem;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:monospace}
#sb-test-btn:hover{background:#2563eb}
#sb-refresh-btn{margin-top:.4rem;width:100%;padding:.45rem;background:#059669;color:#fff;border:none;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:monospace}
#sb-refresh-btn:hover{background:#10b981}
</style>

<button id="sb-debug-btn" title="Supabase debug panel">⚡ SB Debug</button>
<div id="sb-debug-overlay">
  <div id="sb-debug-box">
    <h3>Supabase Debug Panel</h3>
    <div id="sb-debug-rows"></div>
    <div id="sb-debug-log">Click "Run Test" to start…</div>
    <button id="sb-test-btn">▶ Run Full Test (read + write + delete)</button>
    <button id="sb-refresh-btn">↻ Re-run DB.init() and refresh panel</button>
  </div>
</div>

<script>
(function () {
  const btn      = document.getElementById('sb-debug-btn');
  const overlay  = document.getElementById('sb-debug-overlay');
  const rows     = document.getElementById('sb-debug-rows');
  const log      = document.getElementById('sb-debug-log');
  const testBtn  = document.getElementById('sb-test-btn');
  const refBtn   = document.getElementById('sb-refresh-btn');

  btn.addEventListener('click', () => { overlay.classList.toggle('open'); if (overlay.classList.contains('open')) renderStatus(); });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  function tag(ok, yes, no) {
    return ok
      ? `<span class="sb-ok">✅ ${yes}</span>`
      : `<span class="sb-fail">❌ ${no}</span>`;
  }
  function row(label, val) {
    return `<div class="sb-row"><span class="sb-label">${label}</span><span>${val}</span></div>`;
  }

  function renderStatus() {
    const sb = window._sbClient;
    const url = (typeof SUPABASE_URL !== 'undefined') ? SUPABASE_URL : '(not in scope)';
    const key = (typeof SUPABASE_ANON !== 'undefined') ? SUPABASE_ANON.slice(0, 20) + '…' : '(not in scope)';
    const clientOk = !!(sb && typeof sb.from === 'function');

    rows.innerHTML = [
      row('window._sbClient',    tag(sb,        'exists',  'null / undefined')),
      row('.from() callable',    tag(clientOk,  'yes',     'NO — client broken')),
      row('SUPABASE_URL',        `<span style="color:#7dd3fc">${url}</span>`),
      row('SUPABASE_ANON (prefix)', `<span style="color:#7dd3fc">${key}</span>`),
      row('_configured() result',tag(clientOk,  'TRUE → Supabase active', 'FALSE → localStorage fallback')),
      row('Categories in LS',    `<span class="sb-warn">${(()=>{try{const v=JSON.parse(localStorage.getItem('b3d_admin_categories')||'[]');return v.length+' rows';}catch{return 'parse error';}})()}</span>`),
      row('Settings in LS',      `<span class="sb-warn">${(()=>{try{const v=localStorage.getItem('b3d_admin_settings');return v?'present ('+Math.round(v.length/1024*100)/100+' KB)':'empty';}catch{return 'error';}})()}</span>`),
      row('Discounts in LS',     `<span class="sb-warn">${(()=>{try{const v=JSON.parse(localStorage.getItem('b3d_admin_discounts')||'[]');return v.length+' rows';}catch{return 'parse error';}})()}</span>`),
    ].join('');
  }

  async function appendLog(msg, cls='') {
    const ts = new Date().toISOString().split('T')[1].slice(0,12);
    log.textContent += `[${ts}] ${msg}\n`;
    log.scrollTop = log.scrollHeight;
  }

  testBtn.addEventListener('click', async () => {
    testBtn.disabled = true;
    log.textContent = '';
    const sb = window._sbClient;

    if (!sb || typeof sb.from !== 'function') {
      appendLog('❌ No Supabase client. window._sbClient is: ' + JSON.stringify(sb));
      testBtn.disabled = false;
      return;
    }
    appendLog('✅ Supabase client found');

    // READ products
    const { data: prods, error: pe } = await sb.from('products').select('id').limit(1);
    appendLog(pe ? '❌ READ products: ' + pe.message : '✅ READ products: ' + JSON.stringify(prods));

    // READ settings
    const { data: setts, error: se } = await sb.from('settings').select('*').eq('id', 1).maybeSingle();
    appendLog(se ? '❌ READ settings: ' + se.message : '✅ READ settings: ok (' + JSON.stringify(setts?.data).slice(0,60) + '…)');

    // READ categories
    const { data: cats, error: ce } = await sb.from('categories').select('*').limit(5);
    appendLog(ce ? '❌ READ categories: ' + ce.message : '✅ READ categories: ' + (cats?.length||0) + ' rows');

    // WRITE test category
    const testId = 'debug-test-' + Date.now();
    const { error: we } = await sb.from('categories').insert({ id: testId, name_en: 'Debug Test', name_ar: 'اختبار', icon: '🔧', sort_order: 999 });
    appendLog(we ? '❌ WRITE categories: ' + we.message : '✅ WRITE categories: inserted ' + testId);

    // DELETE test category
    if (!we) {
      const { error: de } = await sb.from('categories').delete().eq('id', testId);
      appendLog(de ? '❌ DELETE test row: ' + de.message : '✅ DELETE test row: cleaned up');
    }

    // WRITE settings
    const { error: swe } = await sb.from('settings').upsert({ id: 1, data: { _debugTest: true }, updated_at: new Date().toISOString() });
    appendLog(swe ? '❌ WRITE settings: ' + swe.message : '✅ WRITE settings: upsert ok');

    appendLog('— Test complete —');
    testBtn.disabled = false;
    renderStatus();
  });

  refBtn.addEventListener('click', async () => {
    refBtn.disabled = true;
    log.textContent = '';
    appendLog('Running DB.init()…');
    const t0 = Date.now();
    try {
      await DB.init();
      appendLog('✅ DB.init() done in ' + (Date.now()-t0) + 'ms');
    } catch (e) {
      appendLog('❌ DB.init() threw: ' + e.message);
    }
    renderStatus();
    refBtn.disabled = false;
  });
})();
</script>

</body>
</html>
